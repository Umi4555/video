<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vidéo Bac Pro CIEL - Lycée Château Blanc</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <button class="back-button" aria-label="Retour à l'accueil" onclick="location.href='https://umi4555.github.io/accueil/'">
    ← Accueil
  </button>

  <main class="video-wrapper" role="main">
    <header class="video-header" aria-hidden="false">
      <h1>Bac Pro CIEL</h1>
      <p>Découvrez notre formation professionnelle à travers cette vidéo</p>
    </header>

    <section class="video-container">
      <div class="videos-grid single">
        <div class="video-item large">
          <video controls preload="metadata" poster="poster.png" aria-label="Vidéo de présentation Bac Pro CIEL">
            <source src="screenrecording-01-31-2025-22-23-25-1-copie_8YKEBkOm.mp4" type="video/mp4" />
            Votre navigateur ne supporte pas la lecture vidéo.
          </video>
        </div>
      </div>
    </section>
  </main>

  <!-- Small script to ensure focus management for accessibility -->
  <script>
    // Move focus to main content for keyboard users
    document.addEventListener('DOMContentLoaded', () => {
      const main = document.querySelector('.video-wrapper');
      if (main) main.setAttribute('tabindex', '-1');
      main && main.focus();
    });
  </script>
</body>
</html>
